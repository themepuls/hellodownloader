# HelloDownloader — Nginx config for:
#   hellodownloader.com      → Next.js (port 3000)
#   www.hellodownloader.com  → redirect to apex
#   api.hellodownloader.com  → NestJS API (port 4001)
#
# Install:
#   sudo cp deploy/nginx.hellodownloader.conf /etc/nginx/sites-available/hellodownloader
#   sudo ln -sf /etc/nginx/sites-available/hellodownloader /etc/nginx/sites-enabled/hellodownloader
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after DNS A records point to this server):
#   sudo certbot --nginx -d hellodownloader.com -d www.hellodownloader.com -d api.hellodownloader.com

upstream hd_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

upstream hd_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# --- API subdomain ---
server {
    listen 80;
    listen [::]:80;
    server_name api.hellodownloader.com;

    client_max_body_size 500M;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;

    location / {
        proxy_pass http://hd_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# --- www → apex ---
server {
    listen 80;
    listen [::]:80;
    server_name www.hellodownloader.com;
    return 301 http://hellodownloader.com$request_uri;
}

# --- Main site ---
server {
    listen 80;
    listen [::]:80;
    server_name hellodownloader.com;

    client_max_body_size 500M;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;

    location / {
        proxy_pass http://hd_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
